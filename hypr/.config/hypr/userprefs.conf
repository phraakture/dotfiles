# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░


#  Uncomment to enable // change to a preferred value
# 🔗 See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    # kb_options = caps:super
    # kb_layout = us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat 
    # numlock_by_default = true

    # 🔗 See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = on
    }

}

device {
  name = syna3091:00-06cb:82f5-touchpad
  enabled = true
}

# 🔗 See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg
exec-once = export SSH_AUTH_SOCK="$XDG_RUNTIME_DIR/keyring/ssh"

# straight outta transparency
windowrule {
name = opacity stuff
match:class = (.*)
  opaque = true
}

# Custom workspace bindings
bind = SUPER, U, workspace, 1
bind = SUPER, I, workspace, 2
bind = SUPER, O, workspace, 3

bindd = Super, M, $d toggle fullscreen, fullscreen
bind = SUPER, R, exec, rec-toggle
